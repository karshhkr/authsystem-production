# 1. Database Connection (Variables check kariye ya direct value daliye)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# 2. PostgreSQL Driver & Dialect (FIXED: Yahan MySQL hatakar Postgres kiya hai)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 3. Server Settings
server.port=8081
server.address=0.0.0.0

# 4. JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# 5. Hikari Connection Pool (For Neon Stability)
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# 6. Flyway (Mandatory for Table Creation)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
logging.level.org.flywaydb=DEBUG

# 7. JWT Settings
app.jwt.secret=dev_secret_dev_secret_dev_secret_dev_secret_123456
app.jwt.access-exp-min=15
app.jwt.refresh-exp-days=7

# 8. Swagger & Actuator
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# 9. Logging
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG


spring.datasource.hikari.initialization-fail-timeout=1