spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================================================
# 2. HIBERNATE & JPA SETTINGS
# ==============================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ==============================================================
# 3. HIKARI POOL SETTINGS (FOR NEON STABILITY)
# ==============================================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.idle-timeout=600000

# ==============================================================
# 4. FLYWAY MIGRATION
# ==============================================================


spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.validate-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ==============================================================
# 5. SERVER & JWT SECURITY
# ==============================================================
server.port=8081
app.jwt.secret=dev_secret_key_make_it_long_enough_1234567890_secure
app.jwt.access-exp-min=15
app.jwt.refresh-exp-days=7

# Logging for debugging
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG